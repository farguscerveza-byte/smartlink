<style>
  :root{
    --ink:#f3efe8;
    --ink-dim:#b9b4ac;
    --bg-top:#0c1116;
    --bg-bottom:#05070a;
    --accent:#d9a441; /* warm amber, pulled from the smoke/backlight in the cover art */
    --card-bg:rgba(243,239,232,0.06);
    --card-border:rgba(243,239,232,0.14);
    --radius:14px;
    --font-display: 'Montserrat', 'Proxima Nova', sans-serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    background: radial-gradient(120% 90% at 50% 0%, #14202b 0%, var(--bg-top) 45%, var(--bg-bottom) 100%);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    overflow-x:hidden;
  }

  /* ---- Background media layer (image OR video) ---- */
  #bg-media{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
  }
  #bg-media img, #bg-media video{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.35) saturate(1.1);
  }
  #bg-media::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(5,7,10,0.15) 0%, rgba(5,7,10,0.55) 55%, rgba(5,7,10,0.95) 100%);
  }

  .wrap{
    position:relative;
    z-index:1;
    width:100%;
    max-width:480px;
    padding:48px 24px 64px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .cover{
    width:220px;
    height:220px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    margin-bottom:32px;
  }
  .cover img{width:100%;height:100%;object-fit:cover;display:block;}

  h1{
    font-family:var(--font-display);
    font-weight:600;
    font-size:2.5rem;
    line-height:1.08;
    margin:0 0 10px;
    letter-spacing:-0.01em;
  }
  .eyebrow{
    font-size:0.95rem;
    color:var(--ink-dim);
    letter-spacing:0.02em;
    margin:0 0 36px;
  }
  .eyebrow::before, .eyebrow::after{
    content:"~";
    color:var(--accent);
    margin:0 8px;
  }

  .links{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-bottom:36px;
  }
  .dsp-link{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    padding:18px 22px;
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:var(--radius);
    text-decoration:none;
    color:var(--ink);
    transition:transform .15s ease, background .15s ease, border-color .15s ease;
  }
  .dsp-link:hover, .dsp-link:focus-visible{
    background:rgba(243,239,232,0.11);
    border-color:rgba(217,164,65,0.5);
    transform:translateY(-1px);
  }
  .dsp-link:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .dsp-link .action{ font-weight:600; font-size:1.05rem; }
  .dsp-link .service{ display:flex; align-items:center; gap:10px; color:var(--ink-dim); font-size:1.02rem; }
  .dsp-link .service svg{ width:22px; height:22px; flex-shrink:0; }

  .subscribe{
    width:100%;
    display:flex;
    border-radius:var(--radius);
    overflow:hidden;
    border:1px solid var(--card-border);
  }
  .subscribe input{
    flex:1;
    border:none;
    background:rgba(0,0,0,0.35);
    color:var(--ink);
    padding:0 18px;
    font-size:1rem;
    font-family:var(--font-body);
  }
  .subscribe input::placeholder{ color:var(--ink-dim); }
  .subscribe input:focus{ outline:none; background:rgba(0,0,0,0.5); }
  .subscribe button{
    border:none;
    background:#5836c7;
    color:var(--ink);
    font-weight:700;
    padding:0 24px;
    font-size:1rem;
    cursor:pointer;
    font-family:var(--font-body);
  }
  .subscribe .row{ display:flex; width:100%; min-height:56px; }

  .status-msg{ font-size:0.85rem; color:var(--ink-dim); margin-top:10px; min-height:1.2em; }

  footer{
    position:relative;
    z-index:1;
    font-size:0.75rem;
    color:var(--ink-dim);
    opacity:0.6;
    padding-bottom:24px;
  }

  @media (prefers-reduced-motion: no-preference){
    .wrap > *{ animation: rise 0.6s ease both; }
    .cover{ animation-delay: 0s; }
    h1{ animation-delay: .08s; }
    .eyebrow{ animation-delay: .14s; }
    .links .dsp-link:nth-child(1){ animation: rise 0.6s ease .2s both; }
    .links .dsp-link:nth-child(2){ animation: rise 0.6s ease .27s both; }
    .links .dsp-link:nth-child(3){ animation: rise 0.6s ease .34s both; }
    .subscribe{ animation: rise 0.6s ease .4s both; }
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }
</style>

<script>
  var RELEASE = 'sib';

  // Fire a Pixel event + hit our own click-counter API whenever a DSP button is clicked.
  document.querySelectorAll('.dsp-link').forEach(function(link){
    link.addEventListener('click', function(){
      var platform = link.dataset.platform;
      if (window.fbq) {
        fbq('trackCustom', 'DSPClick', { platform: platform });
      }
      // Fire-and-forget: don't block navigation on this.
      fetch('/api/click', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ platform: platform, release: RELEASE }),
        keepalive: true
      }).catch(function(){ /* ignore network errors, never block the click */ });
    });
  });

  // Basic email capture -> your own endpoint (wire this up to Mailchimp/ConvertKit/etc later)
  document.getElementById('subscribe-form').addEventListener('submit', function(e){
    e.preventDefault();
    var email = e.target.email.value;
    var statusEl = document.getElementById('status-msg');
    if (window.fbq) fbq('track', 'Lead');
    fetch('/api/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, release: RELEASE })
    }).then(function(){
      statusEl.textContent = "You're on the list.";
      e.target.reset();
    }).catch(function(){
      statusEl.textContent = "Something went wrong — try again.";
    });
  });
</script>
